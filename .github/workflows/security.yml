name: Security scan
on:
  push: { branches: [main, master] }
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
  actions: read
  issues: write          # BẮT BUỘC: job DAST (OWASP ZAP) cần quyền này mới chạy
jobs:
  security:
    uses: cochecheee/sast-action/.github/workflows/sast-ci.yml@master
    with:
      language: java
      mcp_project_id: 23
      gate_enabled: true
    secrets:
      dashboard_url:   ${{ secrets.MCP_GATEWAY_URL }}
      dashboard_token: ${{ secrets.MCP_WEBHOOK_TOKEN }}
      # nvd_api_key: OPTIONAL — chỉ dùng cho OWASP Dependency-Check (Java);
      # bỏ trống vẫn quét được (SCA Java có thể chậm/bị NVD rate-limit).
      nvd_api_key:     ${{ secrets.NVD_API_KEY }}
