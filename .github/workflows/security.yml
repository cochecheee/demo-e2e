name: Security scan
on:
  push: { branches: [main, master] }
  pull_request:
  workflow_dispatch:
permissions:
  contents: write
  security-events: write
  actions: write
  issues: write
jobs:
  security:
    uses: cochecheee/sast-action/.github/workflows/sast-ci.yml@master
    with:
      language: java
      mcp_project_id: 1
      gate_enabled: true
    secrets:
      dashboard_url:   ${{ secrets.MCP_GATEWAY_URL }}
      dashboard_token: ${{ secrets.MCP_WEBHOOK_TOKEN }}
